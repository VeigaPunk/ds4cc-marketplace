name: Deploy marketplace to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://veigapunk.github.io/ds4cc-marketplace/
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate agent payloads
        run: node scripts/validate-agent-payloads.mjs

      - name: Check isolated OpenCode install
        run: node scripts/check-opencode-install.mjs

      - name: Test and build Kimi marketplace
        run: |
          python3 -m unittest -v tests.test_build_kimi_marketplace
          python3 scripts/build-kimi-marketplace.py

      - name: Test marketplace validator
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/ds4cc-cargo-target
        run: cargo test --manifest-path marketplace/validator/Cargo.toml

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
