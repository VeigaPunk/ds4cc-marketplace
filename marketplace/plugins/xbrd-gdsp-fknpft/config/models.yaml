claude:
  default: claude-opus-4-9
  effort: xhigh
codex:
  default: gpt-5.6-sol
  reasoning_effort: xhigh
  features:
    fast_mode: true
gemma:
  # Local Ollama model via Bend/HVM2 bridge (gemma-hvm → libhvm_gemma.so).
  # Override with HVM_GEMMA_MODEL / HVM_GEMMA_BIN. xbreed prefix: g-
  default: gemma4:26b
  transport: hvm
  bin: gemma-hvm
# Legacy key — same lane as gemma (cloud Gemini retired 2026-07-21).
gemini:
  default: gemma4:26b
  transport: hvm
  bin: gemma-hvm
